name: Deploy UI Prompt Studio to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'front-end/ui_prompt_studio/**'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API Key
        run: |
          sed -i "s|%%GEMINI_API_KEY%%|${{ secrets.GEMINI_API_KEY }}|g" front-end/ui_prompt_studio/app.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: front-end/ui_prompt_studio

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4